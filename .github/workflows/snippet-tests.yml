name: Verify docs snippets

# Runs bin/run-snippets.py --check against every snippet advertised by the
# docs site (bin/_docs_components.py). The runner verifies each snippet
# according to its catalog flags:
#
#   * Snippets marked runnable are executed and their stdout is compared to
#     bin/_expected_outputs.json. Runtime failures, output drift, or new
#     snippets without a captured baseline all fail CI.
#   * A small NO_EXPECTED allowlist (in run-snippets.py) covers runnable
#     snippets whose stdout is unstable (real network traffic, timestamps).
#     They still must exit 0; their output is not pinned.
#   * Snippets marked non-runnable (ones that need a listening port or a
#     long-lived daemon) are validated with `php -l` so syntax errors still
#     fail CI.
#
# In short: every snippet in the catalog is verified one way or the other —
# none is silently skipped.

on:
  pull_request:
    paths:
      - 'components/**'
      - 'bin/_docs_components.py'
      - 'bin/_expected_outputs.json'
      - 'bin/run-snippets.py'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/snippet-tests.yml'
  push:
    branches: [trunk]
  workflow_dispatch:

jobs:
  run-snippets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install toolkit dependencies
        run: composer install --no-dev --optimize-autoloader --no-progress

      - name: Run docs snippets and compare to expected output
        run: bin/run-snippets.py --check
